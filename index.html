<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- AUTHENTICATION -->
    <div id="auth-view" class="screen active">
        <div class="auth-card">
            <div class="auth-icon"><i class="fa-solid fa-bolt"></i></div>
            <h2>Nexus Notes</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email Address" required autocomplete="off">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fa-regular fa-eye toggle-password-btn" data-target="password"></i>
                </div>
                <button type="submit" id="auth-btn">Sign In / Sign Up</button>
                <p id="auth-error"></p>
            </form>
        </div>
    </div>

    <!-- SIDEBAR DRAWER -->
    <div id="sidebar-overlay" class="overlay"></div>
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="auth-icon-small"><i class="fa-solid fa-bolt"></i></div>
            <h3>Nexus</h3>
        </div>
        <nav class="sidebar-nav">
            <button type="button" class="nav-item active" data-target="home-view"><i class="fa-solid fa-house"></i> Home</button>
            <button type="button" class="nav-item" data-target="trash-view"><i class="fa-solid fa-trash-can"></i> Trash</button>
            <button type="button" class="nav-item" data-target="account-view"><i class="fa-solid fa-user"></i> Account Center</button>
            <button type="button" class="nav-item" data-target="settings-view"><i class="fa-solid fa-gear"></i> Settings</button>
            <button type="button" class="nav-item text-danger" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
        </nav>
    </aside>

    <!-- HOME VIEW (Grid) -->
    <div id="home-view" class="screen">
        <header class="home-header">
            <div class="header-top">
                <button type="button" class="menu-btn-global"><i class="fa-solid fa-bars"></i></button>
                <h1>Notes</h1>
                <button type="button" id="edit-mode-btn" class="header-icon-btn" title="Select Notes"><i class="fa-solid fa-pencil"></i></button>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search notes...">
            </div>
        </header>

        <main class="notes-grid-container" id="home-grid-container">
            <div id="home-loading" class="empty-state loading-state">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <p>Loading your notes...</p>
            </div>
            
            <div id="notes-grid" class="notes-grid"></div>
            
            <div id="empty-state" class="empty-state">
                <i class="fa-regular fa-folder-open"></i>
                <p>No notes yet.</p>
            </div>
        </main>

        <!-- Edit Mode Action Bar -->
        <div id="edit-action-bar" class="edit-action-bar hidden">
            <span id="selected-count">0 Selected</span>
            <div class="edit-actions-right">
                <button type="button" id="select-all-btn" class="btn-text">Select All</button>
                <button type="button" id="cancel-edit-btn" class="btn-text">Cancel</button>
                <button type="button" id="delete-selected-btn" class="btn-danger"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
        </div>

        <!-- Floating Action Button -->
        <div class="fab-container">
            <div class="fab-menu" id="fab-menu">
                <button type="button" class="fab-sub" id="fab-text" title="Add Text Note"><i class="fa-solid fa-pen"></i></button>
                <button type="button" class="fab-sub" id="fab-image" title="Add Image"><i class="fa-regular fa-image"></i></button>
                <button type="button" class="fab-sub" id="fab-todo" title="Add To-Do"><i class="fa-solid fa-list-check"></i></button>
            </div>
            <button type="button" id="fab-main"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- TRASH VIEW -->
    <div id="trash-view" class="screen">
        <header class="home-header">
            <div class="header-top">
                <button type="button" class="menu-btn-global"><i class="fa-solid fa-bars"></i></button>
                <h1>Trash</h1>
                <button type="button" id="empty-trash-btn" class="header-icon-btn text-danger" title="Empty Trash"><i class="fa-solid fa-dumpster-fire"></i></button>
            </div>
            <p class="text-muted" style="font-size: 13px; margin-bottom: 10px;">Deleted notes are kept here.</p>
        </header>

        <main class="notes-grid-container">
            <div id="trash-loading" class="empty-state loading-state">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <p>Loading trash...</p>
            </div>
            
            <div id="trash-grid" class="notes-grid"></div>
            
            <div id="trash-empty-state" class="empty-state">
                <i class="fa-solid fa-dumpster"></i>
                <p>Trash is empty.</p>
            </div>
        </main>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editor-view" class="screen">
        <header class="editor-header">
            <button type="button" id="back-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="save-status"></span>
            <div class="editor-actions">
                <button type="button" id="pin-btn"><i class="fa-solid fa-thumbtack"></i></button>
                <button type="button" id="color-btn"><i class="fa-solid fa-palette"></i></button>
            </div>
        </header>

        <div id="color-picker" class="color-picker hidden">
            <div class="color-swatch" style="background: var(--bg-card);" data-color="default"></div>
            <div class="color-swatch" style="background: #ffe5d9;" data-color="#ffe5d9"></div>
            <div class="color-swatch" style="background: #fff3c4;" data-color="#fff3c4"></div>
            <div class="color-swatch" style="background: #d4f0f0;" data-color="#d4f0f0"></div>
            <div class="color-swatch" style="background: #e8dff5;" data-color="#e8dff5"></div>
        </div>

        <div class="editor-body">
            <div id="image-gallery" class="image-gallery"></div>
            <input type="text" id="note-title" placeholder="Title" autocomplete="off">
            <p id="note-date" class="note-date"></p>
            
            <div id="note-content" class="editor-content" contenteditable="true" data-placeholder="Start typing..."></div>
            
            <div id="todo-content" class="todo-content hidden">
                <div id="todo-list"></div>
                <div class="todo-item add-todo">
                    <i class="fa-solid fa-plus"></i>
                    <input type="text" id="new-todo-input" placeholder="List item..." class="todo-input">
                </div>
            </div>
        </div>

        <div class="editor-toolbar">
            <button type="button" onclick="document.getElementById('file-upload').click()" title="Add Image"><i class="fa-regular fa-image"></i></button>
            <button type="button" id="toggle-todo-btn" title="Toggle Checklist"><i class="fa-solid fa-list-check"></i></button>
            
            <!-- Universal Text Color Button -->
            <button type="button" class="text-color-btn" title="Change Text Color">
                <div class="custom-text-color-icon">
                    <i class="fa-solid fa-font"></i>
                    <div class="color-indicator" id="text-color-indicator"></div>
                </div>
                <input type="color" id="text-color-picker" value="#1f2937">
            </button>

            <button type="button" id="delete-btn" style="color: var(--danger); margin-left: auto;" title="Move to Trash"><i class="fa-regular fa-trash-can"></i></button>
        </div>

        <input type="file" id="file-upload" accept="image/*" hidden>
    </div>

    <!-- FULL SCREEN IMAGE PREVIEW MODAL -->
    <div id="image-preview-modal" class="image-preview-modal">
        <button type="button" id="close-preview-btn" class="close-preview-btn"><i class="fa-solid fa-xmark"></i></button>
        <img id="preview-image" src="" alt="Full Screen Preview">
    </div>

    <!-- ACCOUNT CENTER VIEW -->
    <div id="account-view" class="screen">
        <header class="home-header">
            <div class="header-top">
                <button type="button" class="menu-btn-global"><i class="fa-solid fa-bars"></i></button>
                <h1>Account Center</h1>
                <div style="width: 40px;"></div>
            </div>
        </header>
        <div class="settings-body">
            <div class="account-card">
                <div class="auth-icon" style="margin-bottom:10px;"><i class="fa-solid fa-user"></i></div>
                <h3 id="acc-username">Loading...</h3>
                <p id="acc-email-display" class="text-muted" style="font-size: 13px;"></p>
                <p id="acc-id" class="text-muted" style="font-size: 11px; word-break: break-all; margin-top: 5px;"></p>
            </div>
            
            <form id="username-update-form" class="settings-card">
                <h3>Change Username</h3>
                <input type="text" id="new-username" placeholder="New Username" required class="settings-input" style="margin-bottom: 15px;">
                <button type="submit" class="settings-btn">Update Username</button>
                <p id="username-msg" style="font-size:13px; margin-top:10px;"></p>
            </form>

            <form id="password-reset-form" class="settings-card">
                <h3>Change Password</h3>
                <div class="password-wrapper">
                    <input type="password" id="current-pwd" placeholder="Current Password" required class="settings-input">
                    <i class="fa-regular fa-eye toggle-password-btn" data-target="current-pwd"></i>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="new-pwd" placeholder="New Password" required class="settings-input">
                    <i class="fa-regular fa-eye toggle-password-btn" data-target="new-pwd"></i>
                </div>
                <button type="submit" class="settings-btn">Update Password</button>
                <p id="pwd-msg" style="font-size:13px; margin-top:10px;"></p>
            </form>
        </div>
    </div>

    <!-- SETTINGS VIEW -->
    <div id="settings-view" class="screen">
        <header class="home-header">
            <div class="header-top">
                <button type="button" class="menu-btn-global"><i class="fa-solid fa-bars"></i></button>
                <h1>Settings</h1>
                <div style="width: 40px;"></div>
            </div>
        </header>
        <div class="settings-body">
            <div class="settings-card flex-row">
                <div>
                    <h3>Dark Mode</h3>
                    <p class="text-muted" style="font-size: 13px;">Toggle app theme</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
